<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Grid</title>
    <link ref="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"> 
<style>                         
                                
    .col {
        text-align: center;
        border:1px solid black;

    }
</style>   
</head>

<body>
    <div class="container">
        <h1>hello students!</h1>
        <p> resize the browser window to see the effect</p>
        <div class="row">
            <!--size medium and extra small-->
            <div class="col-md-8 col-xs-4" style="background-color:red; border: 1px solid black;">xs
            </div>
            <div class="col-md-12 col-xs-5" style="background-color:lavender;>.col-xs-6 </div>
        </div>
        
            <div class="row">
            <!--size large, medium and extra small-->
            <div class="col-md-12 col-xs-6" style="background-color:lavenderblush;">.col-xs-6</div>
            <div class="col-md-6 col-xs-2" style="background-color:lightgrey;">.col-xs-6</div>
            </div>

            <div class="row" style="background-color:lightcyan;">
        <!--size extra small-->
        <div class="col-xs-6">.col-xs-6</div>       
         <div class="col-xs-6">.col-xs-6</div>    
        </div>
    </div>

    

</body>

</html>
